name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  cli-and-package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          python-version: "3.13.5"
          enable-cache: true
      - run: uv sync --locked
      - run: uv run python -m unittest tests.test_cli tests.test_scores tests.test_release
      - run: uv run one-layer --help
      - run: uv run one-layer validate submissions/baseline_adamw/submission.py
      - run: uv build --out-dir /tmp/one-layer-dist
      - name: Verify wheel contents
        run: |
          uv run python - <<'PY'
          from pathlib import Path
          from zipfile import ZipFile

          wheel = next(Path("/tmp/one-layer-dist").glob("*.whl"))
          with ZipFile(wheel) as archive:
              names = set(archive.namelist())
          assert "client/cli.py" in names
          assert "client/catalog.py" in names
          assert "benchmark/manifests/smoke_cpu.json" in names
          assert any(name.endswith(".dist-info/licenses/LICENSE") for name in names)
          assert "service/app.py" in names
          assert "service/static/style.css" in names
          assert "service/static/favicon.svg" in names
          PY

  benchmark:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          python-version: "3.13.5"
          enable-cache: true
      - run: uv sync --locked
      - run: uv run python -m unittest discover -s tests
      - name: Run CPU smoke evaluation
        run: |
          uv run python -m benchmark.runner \
            --manifest benchmark/manifests/smoke_cpu.json \
            --submission-file submissions/baseline_adamw/submission.py
